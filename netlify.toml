# netlify.toml
# Production deployment configuration for Usama Aslam portfolio + tools platform.

[build]
  command = "npm run build"
  publish = "dist"

# ─── Cache headers ────────────────────────────────────────────────────────────
# Hashed JS/CSS assets — immutable, cache 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images in /og/ — cache 7 days (may be updated)
[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Favicon — cache 7 days
[[headers]]
  for = "/favicon.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML pages — no cache (always fresh, prerendered content)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Sitemap + robots — short cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ─── Security headers (all pages) ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
